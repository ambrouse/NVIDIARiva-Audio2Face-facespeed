name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt
      - name: Run backend and setup tests
        run: python -m pytest backend tests
      - name: Check setup script syntax
        run: bash -n scripts/setup.sh
      - name: Check tracked runtime artifacts are absent
        run: |
          ! git ls-files | grep -E '(^|/)(\.env$|logs/|outputs/|\.cache/|.*\.wav$|.*\.mp3$|frontend/\.ms-playwright/|\.local-libs/|\.local-rpms/|riva-model-repo/)'
      - name: Check NVIDIA keys are not tracked
        run: |
          ! git grep -nE 'nvapi-[A-Za-z0-9_-]+'

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Run frontend tests
        working-directory: frontend
        run: npm test
      - name: Build frontend
        working-directory: frontend
        run: npm run build
