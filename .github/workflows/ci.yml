name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt
      - name: Run backend and setup tests
        run: PYTHONPATH=backend python -m pytest tests
      - name: Check setup script syntax
        run: bash -n setup.sh && bash -n scripts/setup.sh && bash -n scripts/manage-logs.sh
      - name: Check README and evidence assets
        run: |
          test -s README.md
          test -s docs/assets/facespeed-readme-banner.png
          test -s docs/assets/voice-rag-avatar-demo.gif
          test -s tests/README.md
          test -s tests/benchmarks/README.md
          test -s tests/benchmarks/REPORT-2026-05-25-rag-voice.md
          test -s tests/nginx-proxy/test-nginx-proxy-20260526-v1.md
          test -s tests/nginx-proxy/evidence-2026-05-26/nginx-proxy-home.png
          test -s tests/nginx-proxy/evidence-2026-05-26/sources-popup-100-docs.png
      - name: Check tracked runtime artifacts are absent
        run: |
          ! git ls-files | grep -E '(^|/)(\.env$|outputs/|storage/|\.cache/|.*\.(mp3|wav)$|frontend/\.ms-playwright/|\.local-libs/|\.local-rpms/|riva-model-repo/)'
          ! git ls-files 'logs/**' | grep -Ev '^(logs/README.md|logs/(plans|documentation|benchmarks)/[^/]+\.md|logs/(setup|riva|port-forward)/README.md|logs/benchmarks/bridges/README.md)$'
      - name: Check NVIDIA keys are not tracked
        run: |
          ! git grep -nE 'nvapi-[A-Za-z0-9_-]+'
          ! git grep -nE '(sk-[A-Za-z0-9]{20,}|AKIA[0-9A-Z]{16}|BEGIN (RSA|OPENSSH|EC) PRIVATE KEY)'

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Run frontend tests
        working-directory: frontend
        run: npm test
      - name: Build frontend
        working-directory: frontend
        run: npm run build
