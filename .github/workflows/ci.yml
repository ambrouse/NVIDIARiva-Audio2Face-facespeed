name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt
      - name: Run backend and setup tests
        run: PYTHONPATH=backend python -m pytest backend/tests tests
      - name: Check setup script syntax
        run: bash -n setup.sh && bash -n scripts/setup.sh && bash -n scripts/manage-logs.sh
      - name: Check README and evidence assets
        run: |
          test -s README.md
          test -s docs/assets/voice-rag-avatar-demo.gif
          test -s test/release-readiness-2026-05-23/README.md
          test -s test/release-readiness-2026-05-23/browser-report.json
          test -s test/release-readiness-2026-05-23/pipeline/docling-output-answer.wav
          test -s test/release-readiness-2026-05-23/pipeline/docling-avatar-3d-moving.webm
          test -s test/release-clone-validation-2026-05-23/README.md
          test -s test/release-clone-validation-2026-05-23/browser-report.json
          test -s test/release-clone-validation-2026-05-23/commands/35-clone-artifact-summary.json
          duplicate_hashes="$(sha256sum test/release-readiness-2026-05-23/app/*.png test/release-clone-validation-2026-05-23/app/*.png | awk '{print $1}' | sort | uniq -d)"
          test -z "$duplicate_hashes"
      - name: Check tracked runtime artifacts are absent
        run: |
          ! git ls-files | grep -E '(^|/)(\.env$|outputs/|storage/|\.cache/|.*\.mp3$|frontend/\.ms-playwright/|\.local-libs/|\.local-rpms/|riva-model-repo/)'
          ! git ls-files 'logs/**' | grep -Ev '^(logs/README.md|logs/plans/[^/]+\.md)$'
          ! git ls-files '*.wav' | grep -Ev '^test/.+\.wav$'
      - name: Check NVIDIA keys are not tracked
        run: |
          ! git grep -nE 'nvapi-[A-Za-z0-9_-]+'
          ! git grep -nE '(sk-[A-Za-z0-9]{20,}|AKIA[0-9A-Z]{16}|BEGIN (RSA|OPENSSH|EC) PRIVATE KEY)'

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Run frontend tests
        working-directory: frontend
        run: npm test
      - name: Build frontend
        working-directory: frontend
        run: npm run build
